<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habito</title>
  <meta name="description" content="Simple habit tracking app" />

  <style>
    :root{
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b6b6b;
      --border: #e6e6e6;
      --btn-dark: #111111;
      --btn-dark-hover: #2a2a2a;
      --radius: 14px;
    }

    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container{
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    h1{
      font-size: 56px;
      font-weight: 600;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
    }

    p{
      font-size: 18px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .buttons{
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 30px;
    }

    .btn{
      text-decoration: none;
      display: block;
      padding: 16px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 500;
      border: 1px solid var(--border);
      transition: 0.2s ease;
    }

    .btn-primary{
      background: var(--btn-dark);
      color: white;
      border: none;
    }

    .btn-primary:hover{
      background: var(--btn-dark-hover);
    }

    .btn-secondary{
      background: #f7f7f7;
      color: var(--text);
    }

    .btn-secondary:hover{
      background: #ececec;
    }

    .privacy{
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      transition: 0.2s;
    }

    .privacy:hover{
      color: var(--text);
    }

    footer{
      margin-top: 40px;
      font-size: 13px;
      color: #9a9a9a;
    }

    @media (max-width: 500px){
      h1{
        font-size: 42px;
      }

      p{
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Habito</h1>

    <p>
      Simple habit tracking app for building consistency every day.
    </p>

    <div class="buttons">
      <a class="btn btn-primary" href="#" target="_blank">
        Download on App Store
      </a>

      <a class="btn btn-secondary" href="#" target="_blank">
        Get it on Google Play
      </a>
    </div>

    <a class="privacy" href="privacy.html">Privacy Policy</a>

    <footer>© <span id="year"></span> Habito</footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
