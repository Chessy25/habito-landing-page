<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habito</title>
  <meta name="description" content="Habito - simple habit tracking app" />
  <meta name="theme-color" content="#111111" />

  <style>
    :root{
      --bg: #0f0f10;
      --card: #171718;
      --line: #2a2a2d;
      --text: #ffffff;
      --muted: #b7b7bc;
      --button: #ffffff;
      --button-text: #111111;
      --button-hover: #e9e9ea;
      --button-dark: #232326;
      --button-dark-hover: #2d2d31;
      --radius: 20px;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:720px;
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:56px 32px;
      text-align:center;
    }

    h1{
      margin:0 0 14px;
      font-size:52px;
      font-weight:700;
      letter-spacing:-1.4px;
    }

    .subtitle{
      margin:0 auto 34px;
      max-width:520px;
      color:var(--muted);
      font-size:17px;
      line-height:1.7;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:14px;
      max-width:360px;
      margin:0 auto 28px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      padding:0 20px;
      border-radius:14px;
      font-size:16px;
      font-weight:700;
      text-decoration:none;
      transition: .2s ease;
      border:1px solid transparent;
    }

    .btn-light{
      background: var(--button);
      color: var(--button-text);
    }

    .btn-light:hover{
      background: var(--button-hover);
    }

    .btn-dark{
      background: var(--button-dark);
      color: var(--text);
      border-color: var(--line);
    }

    .btn-dark:hover{
      background: var(--button-dark-hover);
    }

    .privacy{
      display:inline-block;
      margin-top:4px;
      color:var(--muted);
      text-decoration:none;
      font-size:15px;
      transition:.2s ease;
    }

    .privacy:hover{
      color:var(--text);
    }

    .footer{
      margin-top:34px;
      color:#8f8f95;
      font-size:13px;
    }

    @media (max-width: 600px){
      .card{
        padding:40px 20px;
      }

      h1{
        font-size:40px;
      }

      .subtitle{
        font-size:15px;
      }

      .btn{
        min-height:52px;
        font-size:15px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Habito</h1>
    <p class="subtitle">
      Simple habit tracking app for building consistency every day.
    </p>

    <div class="buttons">
      <a class="btn btn-light" href="#" target="_blank" rel="noopener noreferrer">
        Download on App Store
      </a>

      <a class="btn btn-dark" href="#" target="_blank" rel="noopener noreferrer">
        Get it on Google Play
      </a>
    </div>

    <a class="privacy" href="privacy.html">Privacy Policy</a>

    <div class="footer">
      © <span id="year"></span> Habito
    </div>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
